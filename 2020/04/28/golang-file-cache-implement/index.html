ss="title">FileCache</span></span> &#123;</span><br><span class="line">    <span class="keyword">return</span> &amp;FileCache&#123;</span><br><span class="line">        CacheDir: cacheDir,</span><br><span class="line">        hash: md5.New(),</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(f *FileCache)</span> <span class="title">SetObject</span><span class="params">(key <span class="keyword">string</span>, object <span class="keyword">interface</span>&#123;&#125;, duration time.Duration)</span> <span class="title">error</span></span> &#123;</span><br><span class="line">    f.hash.Reset()</span><br><span class="line">    f.hash.Write([]<span class="keyword">byte</span>(key))</span><br><span class="line">    filename := hex.EncodeToString(f.hash.Sum(<span class="literal">nil</span>))</span><br><span class="line"></span><br><span class="line">    file, err := os.Create(path.Join(f.CacheDir, filename))</span><br><span class="line">    <span class="keyword">defer</span> file.Close()</span><br><span class="line"></span><br><span class="line">    <span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">        <span class="keyword">return</span> err</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    content, err := json.Marshal(CacheObject&#123;</span><br><span class="line">        Object: object,</span><br><span class="line">        Duration: duration,</span><br><span class="line">    &#125;)</span><br><span class="line">    <span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">        <span class="keyword">return</span> err</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    _, err = file.Write(content)
